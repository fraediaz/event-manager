<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Event Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            @apply bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-rose-400 mb-4">
            {{ status|default:"Error" }}
        </h1>
        <p class="text-2xl text-slate-300 mb-6">
            {{ error }}
        </p>
        <a href="{% url 'home' %}" class="inline-block px-6 py-3 font-semibold text-white rounded-lg transition-all duration-300 bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-400 hover:to-cyan-500 transform hover:scale-105 active:scale-95">
            Volver a Inicio
        </a>
    </div>
</body>
</html>
