<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cyan: #06b6d4;
            --rose: #f43f5e;
            --gold: #fbbf24;
        }
        body {
            @apply bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-rose-400 to-yellow-400 mb-2">
                Event Manager
            </h1>
            <p class="text-slate-400">Accede con tu cuenta</p>
        </div>

        <!-- Login Form -->
        <div class="bg-slate-800/50 border border-slate-700 rounded-lg p-8 backdrop-blur-sm">
            {% if error %}
            <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded text-rose-400 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-200 mb-2">
                        Usuario
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400"
                        placeholder="Tu usuario"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-200 mb-2">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400"
                        placeholder="Tu contraseña"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full py-2 mt-6 font-semibold text-white rounded-lg transition-all duration-300 bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-400 hover:to-cyan-500 transform hover:scale-105 active:scale-95"
                >
                    Iniciar Sesión
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-slate-600"></div>
                <span class="px-3 text-sm text-slate-400">o</span>
                <div class="flex-1 h-px bg-slate-600"></div>
            </div>

            <!-- Signup Link -->
            <div class="text-center">
                <p class="text-slate-400 text-sm">
                    ¿No tienes cuenta?
                    <a href="{% url 'user_signup' %}" class="text-cyan-400 hover:text-cyan-300 font-medium transition-colors">
                        Regístrate aquí
                    </a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{% url 'home' %}" class="text-slate-400 hover:text-slate-300 text-sm transition-colors">
                ← Volver a inicio
            </a>
        </div>
    </div>
</body>
</html>
